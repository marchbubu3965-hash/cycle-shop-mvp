<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>循環商城 - 管理員全功能版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1100px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hidden { display: none; }
        .navbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border-radius: 10px; border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; }
        .btn-buy { background: #2ed573; color: white; width: 100%; }
        .btn-admin { background: #1e90ff; color: white; }
        .btn-back { background: #f39c12; color: white; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .pending-item { border-left: 5px solid #ffa502; padding: 10px; background: #fffaf0; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loginPage" class="card" style="max-width: 350px; margin: 80px auto; text-align: center;">
        <h2>♻️ 循環商城</h2>
        <input type="text" id="usernameInput" placeholder="帳號" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
        <button class="btn-buy" onclick="login()">登入</button>
    </div>

    <div id="mainPage" class="hidden">
        <div class="navbar">
            <h2 id="welcomeMsg">您好</h2>
            <div id="cartToggle" style="background:#ff4757; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;" onclick="toggleCart()">🛒 購物車 (<span id="cartCount">0</span>)</div>
            <button onclick="location.reload()">登出</button>
        </div>

        <div id="cartSection" class="card hidden">
            <h3>🛒 我的購物車</h3>
            <div id="cartItems"></div>
            <button class="btn-buy" style="margin-top:10px;" onclick="checkout()">確認結帳</button>
        </div>

        <div id="buyerUI" class="hidden">
            <div class="card" style="background: #e3f2fd;">
                <h4>💰 帳戶餘額：<span id="userBalance">$0</span></h4>
            </div>
            <div id="productList" class="grid"></div>
            <h3 style="margin-top: 40px;">📋 我的歷史訂單</h3>
            <div id="batchOrderList"></div>
        </div>

        <div id="adminUI" class="hidden">
            <div class="card" style="border: 2px solid #ffa502;">
                <h3>🛠 庫存監控</h3>
                <table>
                    <thead>
                        <tr><th>編號</th><th>名稱</th><th>庫存</th><th>操作</th></tr>
                    </thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
                <hr>
                <h3>➕ 上架新商品</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="pName" placeholder="名稱">
                    <input type="number" id="pPrice" placeholder="價格">
                    <input type="number" id="pStock" placeholder="庫存">
                    <input type="file" id="pImgFile">
                </div>
                <button class="btn-buy" style="width:auto; margin-top:10px;" onclick="addProduct()">確認上架</button>
                <hr>
                <h3 style="color: #e67e22;">⏳ 待處理回購審核</h3>
                <div id="adminPendingList"></div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://localhost:3000";
        const API_URL = `${BASE_URL}/api`;
        let currentUser = null;
        let allProducts = [];
        let cart = [];

        async function login() {
            const username = document.getElementById('usernameInput').value;
            const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username }) });
            if (res.ok) { currentUser = await res.json(); showUI(); }
        }

        function showUI() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `👋 ${currentUser.username}${currentUser.isAdmin ? ' (管理員)' : ''}`;
            if (currentUser.isAdmin) {
                document.getElementById('adminUI').classList.remove('hidden');
                fetchAdminData();
            } else {
                document.getElementById('buyerUI').classList.remove('hidden');
                fetchBuyerData();
            }
        }

        // --- 買家 ---
        async function fetchBuyerData() {
            const prodRes = await fetch(`${API_URL}/products`);
            allProducts = await prodRes.json();
            renderProducts(allProducts);

            const userRes = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser.username }) });
            const userData = await userRes.json();
            document.getElementById('userBalance').innerText = `$${userData.balance}`;

            const orderRes = await fetch(`${API_URL}/user/${currentUser.id}/orders`);
            const batches = await orderRes.json();
            renderOrders(batches);
        }

        function renderProducts(prods) {
            document.getElementById('productList').innerHTML = prods.map(p => `
                <div class="product-card">
                    <img class="product-img" src="${p.description ? BASE_URL + p.description : 'https://via.placeholder.com/240x200'}">
                    <div style="padding:15px;">
                        <h4>${p.name}</h4>
                        <p style="color:#e44d26; font-weight:bold;">$${p.price}</p>
                        <p style="font-size:0.8em; color:#888;">庫存: ${p.stock}</p>
                        <button class="btn-buy" onclick="addToCart(${p.product_id}, '${p.name}', ${p.price})">加入購物車</button>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders(batches) {
            document.getElementById('batchOrderList').innerHTML = batches.map(batch => `
                <div class="card" style="border-left:5px solid #1e90ff;">
                    <div style="font-size:0.8em; color:#999;">#${batch.id} - ${new Date(batch.date).toLocaleString()}</div>
                    ${batch.items.map(item => `
                        <div class="item-row">
                            <span>${item.name} ($${item.price})</span>
                            ${item.buyback_status === 'none' ? `<button class="btn-back" onclick="requestBuyback(${item.item_id})">申請回購</button>` : `<span>[${item.buyback_status}]</span>`}
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++; else cart.push({ id, name, price, qty: 1 });
            updateCartUI(); alert("已加入購物車");
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartItems').innerHTML = cart.map(item => `<div class="item-row"><span>${item.name}</span><span>$${item.price} x ${item.qty}</span></div>`).join('');
        }

        function toggleCart() { document.getElementById('cartSection').classList.toggle('hidden'); }

        async function checkout() {
            await fetch(`${API_URL}/checkout`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: currentUser.id, items: cart }) });
            cart = []; updateCartUI(); toggleCart(); fetchBuyerData(); alert("結帳成功");
        }

        async function requestBuyback(iid) {
            await fetch(`${API_URL}/buyback/request`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ item_id: iid })});
            fetchBuyerData(); alert("申請已送出");
        }

        // --- 管理員 ---
        async function fetchAdminData() {
            // 庫存
            const invRes = await fetch(`${API_URL}/admin/inventory`);
            const inventory = await invRes.json();
            document.getElementById('inventoryBody').innerHTML = inventory.map(p => `
                <tr>
                    <td>#${p.product_id}</td>
                    <td>${p.name}</td>
                    <td><input type="number" id="stock_${p.product_id}" value="${p.stock}" style="width:50px;"></td>
                    <td><button class="btn-admin" onclick="updateStock(${p.product_id})">儲存</button></td>
                </tr>
            `).join('');

            // 回購審核 (補回這裡)
            const pendingRes = await fetch(`${API_URL}/admin/buyback/pending`);
            const pending = await pendingRes.json();
            const container = document.getElementById('adminPendingList');
            
            if (pending.length === 0) {
                container.innerHTML = "<p style='color:#999;'>目前沒有待處理的回購。</p>";
                return;
            }

            container.innerHTML = pending.map(p => `
                <div class="pending-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <strong>${p.username}</strong> 申請回購 <strong>${p.name}</strong><br>
                            <small>原購買價: $${p.purchase_price}</small>
                        </div>
                        <div>
                            <input type="number" id="refund_${p.item_id}" value="${Math.floor(p.purchase_price * 0.8)}" style="width:70px; padding:5px;">
                            <button class="btn-buy" style="width:auto;" onclick="confirmBuyback(${p.item_id})">核發購物金</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStock(pid) {
            const val = document.getElementById(`stock_${pid}`).value;
            await fetch(`${API_URL}/admin/inventory/${pid}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stock: parseInt(val) }) });
            fetchAdminData();
        }

        async function addProduct() {
            const formData = new FormData();
            formData.append('name', document.getElementById('pName').value);
            formData.append('price', document.getElementById('pPrice').value);
            formData.append('stock', document.getElementById('pStock').value);
            formData.append('image', document.getElementById('pImgFile').files[0]);
            await fetch(`${API_URL}/products`, { method: 'POST', body: formData });
            fetchAdminData(); alert("上架成功");
        }

        async function confirmBuyback(iid) {
            const amt = document.getElementById(`refund_${iid}`).value;
            await fetch(`${API_URL}/buyback/confirm`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ item_id: iid, refund_amount: parseInt(amt) })
            });
            fetchAdminData(); alert("購物金已核發給使用者");
        }
    </script>
</body>
</html>
